worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream almacenamiento_api {
        least_conn;
        server almacenamiento:8085;
    }

    upstream topologia_api {
        least_conn;
        server semaforos-topologia:8081;
    }

    server {
        listen 80;

        location = /health {
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location /api/historial/ {
            proxy_pass http://almacenamiento_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/semaforos/ {
            proxy_pass http://topologia_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            add_header Content-Type text/plain;
            return 200 "MVTS proxy activo\n";
        }
    }
}
