<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Mina MVTS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: #ecf0f1; padding: 40px; }
        .card { background: #34495e; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { border-bottom: 2px solid #3498db; padding-bottom: 10px; display: flex; align-items: center; }
        .dot { height: 12px; width: 12px; background-color: #2ecc71; border-radius: 50%; display: inline-block; margin-right: 15px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; color: #333; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #3498db; color: white; text-transform: uppercase; font-size: 0.9em; }
        tr:hover { background: #f1f1f1; }
    </style>
</head>
<body>
    <div class="card">
        <h1><span class="dot"></span> SISTEMA DE MONITOREO MINERO</h1>
        <table>
            <thead>
                <tr>
                    <th>ID Registro</th>
                    <th>Camión ID</th>
                    <th>Latitud</th>
                    <th>Longitud</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody id="datos">
                </tbody>
        </table>
    </div>

    <script>
        function cargarDatos() {
            fetch('/api/reportes/ultima-posicion')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('datos');
                    tbody.innerHTML = '';
                    
                    // Mostramos los últimos 10 registros para ver el historial reciente
                    data.slice(-10).reverse().forEach(p => {
                        const row = `<tr>
                            <td><b>${p.id}</b></td>
                            <td>Camión ${p.vehiculoId}</td>
                            <td>${p.latitud.toFixed(6)}</td>
                            <td>${p.longitud.toFixed(6)}</td>
                            <td>${new Date(p.fechaHora).toLocaleTimeString()}</td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                })
                .catch(err => console.error("Error al conectar con el servidor:", err));
        }

        // Se actualiza cada 2 segundos automáticamente
        setInterval(cargarDatos, 2000);
        cargarDatos(); // Carga inicial
    </script>
</body>
</html>
