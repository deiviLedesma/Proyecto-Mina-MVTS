services:
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: mvts
      RABBITMQ_DEFAULT_PASS: mvts123
    ports:
      - "5672:5672"
      - "1883:1883"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mvts-net

  mysql-semaforos:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mvts_topologia
    ports:
      - "3308:3306"
    volumes:
      - mysql-semaforos-data:/var/lib/mysql
      - ./mysql/semaforos-init.sql:/docker-entrypoint-initdb.d/01-semaforos-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mvts-net

  semaforos-topologia:
    build:
      context: ./SistemaMina
      dockerfile: SemaforosTopologia/Dockerfile
    restart: unless-stopped
    environment:
      HTTP_PORT: 8081
      GRPC_PORT: 9000
      MYSQL_HOST: mysql-semaforos
      MYSQL_PORT: 3306
      MYSQL_DATABASE: mvts_topologia
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: mvts
      RABBITMQ_PASS: mvts123
    ports:
      - "8081:8081"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql-semaforos:
        condition: service_healthy
    networks:
      - mvts-net

  notificaciones:
    build:
      context: ./SistemaMina
      dockerfile: Notificaciones/Dockerfile
    restart: unless-stopped
    environment:
      HTTP_PORT: 8083
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: mvts
      RABBITMQ_PASS: mvts123
    ports:
      - "8083:8083"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - mvts-net

  congestiones:
    build:
      context: ./SistemaMina
      dockerfile: Congestiones/Dockerfile
    restart: unless-stopped
    environment:
      HTTP_PORT: 8082
      GRPC_PORT: 9001
      TOPOLOGIA_HOST: semaforos-topologia
      TOPOLOGIA_PORT: 8081
      NOTIFICACIONES_HOST: notificaciones
      NOTIFICACIONES_PORT: 8083
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: mvts
      RABBITMQ_PASS: mvts123
    ports:
      - "8082:8082"
    depends_on:
      rabbitmq:
        condition: service_healthy
      semaforos-topologia:
        condition: service_started
      notificaciones:
        condition: service_started
    networks:
      - mvts-net

  almacenamiento:
    build:
      context: ./SistemaMina
      dockerfile: Almacenamiento/Dockerfile
    restart: unless-stopped
    environment:
      HTTP_PORT: 8085
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: mvts
      RABBITMQ_PASS: mvts123
    ports:
      - "8085:8085"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - mvts-net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - rabbitmq
      - semaforos-topologia
      - almacenamiento
    ports:
      - "80:80"
    networks:
      - mvts-net

  estacion-central:
    build:
      context: ./SistemaMina
      dockerfile: EstacionCentral/Dockerfile
    restart: unless-stopped
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: mvts
      RABBITMQ_PASS: mvts123
    depends_on:
      rabbitmq:
        condition: service_healthy
      semaforos-topologia:
        condition: service_started
      notificaciones:
        condition: service_started
      congestiones:
        condition: service_started
    networks:
      - mvts-net

  semaforo:
    build:
      context: ./SistemaMina
      dockerfile: Semaforo/Dockerfile
    restart: unless-stopped
    environment:
      MQTT_HOST: rabbitmq
      MQTT_PORT: 1883
      MQTT_USER: mvts
      MQTT_PASSWORD: mvts123
      SEMAFORO_ID: "01"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - mvts-net

  vehiculo:
    build:
      context: ./SistemaMina
      dockerfile: Vehiculo/Dockerfile
    restart: unless-stopped
    environment:
      MQTT_HOST: rabbitmq
      MQTT_PORT: 1883
      MQTT_USER: mvts
      MQTT_PASSWORD: mvts123
      VEHICULO_ID: camion-01
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - mvts-net

  gerencia:
    build:
      context: ./SistemaMina
      dockerfile: Gerencia/Dockerfile
    profiles: ["manual"]
    environment:
      ALMACENAMIENTO_URL: http://nginx/api/historial/congestiones
    depends_on:
      - nginx
    networks:
      - mvts-net

networks:
  mvts-net:
    driver: bridge

volumes:
  rabbitmq-data:
  mysql-semaforos-data:
