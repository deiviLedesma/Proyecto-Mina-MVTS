version: "3.9"

networks:
  mvts-net:
    driver: bridge

volumes:
  mysql-semaforos-data:
  mysql-almacenamiento-data:
  rabbitmq-data:

services:

  # INFRAESTRUCTURA
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: mvts-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "1883:1883"    # MQTT
      - "15672:15672"  # Management UI (usuario: guest / guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - mvts-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-semaforos:
    image: mysql:8.0
    container_name: mvts-mysql-semaforos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bdSemaforos
      MYSQL_USER: semaforos_user
      MYSQL_PASSWORD: semaforos_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-semaforos-data:/var/lib/mysql
      - ./SistemaMina/sql/bdSemaforos.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mvts-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-almacenamiento:
    image: mysql:8.0
    container_name: mvts-mysql-almacenamiento
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bdAlmacenamiento
      MYSQL_USER: almacenamiento_user
      MYSQL_PASSWORD: almacenamiento_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql-almacenamiento-data:/var/lib/mysql
      - ./SistemaMina/sql/bdAlmacenamiento.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mvts-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # SERVIDOR TELEMETRÍA
  semaforos-topologia:
    build:
      context: ./SistemaMina/semaforos-topologia
      dockerfile: Dockerfile
    container_name: mvts-semaforos-topologia
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:mysql://mysql-semaforos:3306/bdSemaforos
      QUARKUS_DATASOURCE_USERNAME: semaforos_user
      QUARKUS_DATASOURCE_PASSWORD: semaforos_pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    ports:
      - "8081:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql-semaforos:
        condition: service_healthy
    networks:
      - mvts-net

  congestiones:
    build:
      context: ./SistemaMina/congestiones
      dockerfile: Dockerfile
    container_name: mvts-congestiones
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      SEMAFOROS_TOPOLOGIA_HOST: semaforos-topologia
      SEMAFOROS_TOPOLOGIA_PORT: 8080
    depends_on:
      rabbitmq:
        condition: service_healthy
      semaforos-topologia:
        condition: service_started
    networks:
      - mvts-net

  notificaciones:
    build:
      context: ./SistemaMina/notificaciones
      dockerfile: Dockerfile
    container_name: mvts-notificaciones
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - mvts-net

  # SERVIDOR ALMACENAMIENTO
  almacenamiento:
    build:
      context: ./SistemaMina/almacenamiento
      dockerfile: Dockerfile
    container_name: mvts-almacenamiento
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:mysql://mysql-almacenamiento:3306/bdAlmacenamiento
      QUARKUS_DATASOURCE_USERNAME: almacenamiento_user
      QUARKUS_DATASOURCE_PASSWORD: almacenamiento_pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest

      MP_JWT_VERIFY_PUBLICKEY_LOCATION: /deployments/jwt-public.pem
      MP_JWT_VERIFY_ISSUER: mvts-auth
    ports:
      - "8082:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql-almacenamiento:
        condition: service_healthy
    networks:
      - mvts-net

  # SERVIDOR WEB
  servidor-web:
    build:
      context: ./SistemaMina/servidor-web
      dockerfile: Dockerfile
    container_name: mvts-servidor-web
    environment:
      ALMACENAMIENTO_HOST: almacenamiento
      ALMACENAMIENTO_PORT: 8080

      MP_JWT_VERIFY_PUBLICKEY_LOCATION: /deployments/jwt-public.pem
      MP_JWT_VERIFY_ISSUER: mvts-auth
    ports:
      - "8083:8080"
    depends_on:
      - almacenamiento
    networks:
      - mvts-net

  # NGINX
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: mvts-nginx
    ports:
      - "80:80"
    depends_on:
      - almacenamiento
      - servidor-web
    networks:
      - mvts-net

  # SIMULADORES
  simulador-semaforo:
    build:
      context: ./simulador-semaforo
      dockerfile: Dockerfile
    container_name: mvts-simulador-semaforo
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 1883
      SEMAFORO_ID: "SEM-001"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - mvts-net

  simulador-vehiculo:
    build:
      context: ./simulador-vehiculo
      dockerfile: Dockerfile
    container_name: mvts-simulador-vehiculo
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 1883
      VEHICULO_ID: "VEH-001"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - mvts-net
